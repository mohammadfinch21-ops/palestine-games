# Netlify deployment — Palestine Train Game (لعبة قطار فلسطين)
# This folder (app/) IS the site root when published.
#
# Netlify UI (Import from Git):
# - Repo root = app/ only  → Base directory: (empty), Publish: `.`
# - Repo root = parent     → Base directory: `app`, Publish: `.` (relative to base)
# Build command: leave empty (static site). Branch: main (or master).

[build]
  publish = "."
  # Static HTML/JS — no build command. Leave Build command empty in Netlify UI.

[build.environment]
  NODE_VERSION = "20"

# Pretty URL for privacy policy (AdSense requirement)
[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/js/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/json; charset=utf-8"

# Multi-page static site — no SPA fallback needed
